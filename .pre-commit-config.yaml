---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: yamllint-ee
        name: yamllint (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/wunder-devtools-ee.sh yamllint
        pass_filenames: true
        files: \.(yml|yaml)$

      - id: hadolint-ee
        name: hadolint (via ee-wunder-devtools-ubi9)
        language: system
        pass_filenames: false
        files: ^(Dockerfile|Containerfile)$
        entry: >-
          bash scripts/wunder-devtools-ee.sh bash -lc
          'if ! docker info >/dev/null 2>&1; then
          if [ "${CI:-false}" = "true" ] || [ "${GITHUB_ACTIONS:-false}" = "true" ];
          then echo "ERROR: Docker API is required for hadolint in CI." >&2; exit 1; fi;
          echo "Skipping hadolint because Docker API is unavailable locally." >&2; exit 0; fi;
          docker run --rm -i docker.io/hadolint/hadolint:v2.14.0 hadolint --failure-threshold error --ignore DL3041 - < Dockerfile'

      - id: actionlint
        name: actionlint (via ee-wunder-devtools-ubi9)
        language: system
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$
        entry: >-
          bash scripts/wunder-devtools-ee.sh bash -lc
          'if ! docker info >/dev/null 2>&1; then
          if [ "${CI:-false}" = "true" ] || [ "${GITHUB_ACTIONS:-false}" = "true" ];
          then echo "ERROR: Docker API is required for actionlint in CI." >&2; exit 1; fi;
          echo "Skipping actionlint because Docker API is unavailable locally." >&2; exit 0; fi;
          docker run --rm -v "$WUNDER_DEVTOOLS_HOST_WORKSPACE":/repo:z -w /repo docker.io/rhysd/actionlint:latest'

      - id: container-build
        name: container build (via ee-wunder-devtools-ubi9)
        language: system
        pass_filenames: false
        files: ^(Dockerfile|Containerfile|\.dockerignore|requirements\.txt|package\.json|package-lock\.json)$
        entry: >-
          bash scripts/wunder-devtools-ee.sh bash -lc '
            set -euo pipefail
            IMAGE="local/${PWD##*/}:precommit"

            if ! docker info >/dev/null 2>&1; then
              if [ "${CI:-false}" = "true" ] || [ "${GITHUB_ACTIONS:-false}" = "true" ]; then
                echo "ERROR: Docker API is required for container build in CI." >&2
                exit 1
              fi
              echo "Skipping container build because Docker API is unavailable locally." >&2
              exit 0
            fi

            docker build -t "$IMAGE" -f Dockerfile .
            echo "Built $IMAGE"
          '

      - id: container-smoke
        name: container smoke test (via ee-wunder-devtools-ubi9)
        language: system
        pass_filenames: false
        files: ^(Dockerfile|Containerfile|\.dockerignore|requirements\.txt|package\.json|package-lock\.json)$
        entry: >-
          bash scripts/wunder-devtools-ee.sh bash -lc '
            set -euo pipefail
            IMAGE="local/${PWD##*/}:precommit"

            if ! docker info >/dev/null 2>&1; then
              if [ "${CI:-false}" = "true" ] || [ "${GITHUB_ACTIONS:-false}" = "true" ]; then
                echo "ERROR: Docker API is required for container smoke in CI." >&2
                exit 1
              fi
              echo "Skipping container smoke because Docker API is unavailable locally." >&2
              exit 0
            fi

            if ! docker image inspect "$IMAGE" >/dev/null 2>&1; then
              docker build -t "$IMAGE" -f Dockerfile .
            fi

            docker run --rm "$IMAGE" bash -lc "ansible --version"
            docker run --rm "$IMAGE" bash -lc "ansible-galaxy --version"
          '

      - id: renovate-config-validate
        name: renovate config linting (via ee-wunder-devtools-ubi9)
        language: system
        pass_filenames: false
        files: ^renovate(\.json|-container\.json)$
        entry: >-
          bash scripts/wunder-devtools-ee.sh bash -lc
          'if ! docker info >/dev/null 2>&1; then
          if [ "${CI:-false}" = "true" ] || [ "${GITHUB_ACTIONS:-false}" = "true" ];
          then echo "ERROR: Docker API is required for renovate-config-validator in CI." >&2; exit 1; fi;
          echo "Skipping renovate config validation because Docker API is unavailable locally." >&2; exit 0; fi;
          docker run --rm -u 0:0 -v "$WUNDER_DEVTOOLS_HOST_WORKSPACE":/repo:z -w /repo
          docker.io/renovate/renovate:latest renovate-config-validator'
